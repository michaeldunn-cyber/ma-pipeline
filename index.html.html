// Airtable stores everything as fields. We serialize arrays/objects as JSON strings.
const toAT = deal => ({
  name:             deal.name || "",
  stage:            deal.stage || "sourcing",
  maType:           deal.maType || "Unclear",
  buSponsor:        deal.buSponsor || "TBD",
  platformPillar:   deal.platformPillar || "TBD",
  source:           deal.source || "",
  banker:           deal.banker || "",
  priceSignal:      deal.priceSignal || "",
  waitingOn:        deal.waitingOn || "None",
  driveFolderUrl:   deal.driveFolderUrl || "",
  deckSummary:      deal.deckSummary || "",
  triageNotes:      deal.triageNotes || "",
  productPingNotes: deal.productPingNotes || "",
  triageMemoNotes:  deal.triageMemoNotes || "",
  icNotes:          deal.icNotes || "",
  passReason:       deal.passReason || "",
  stageHistory:     JSON.stringify(deal.stageHistory || []),
  aiMessages:       JSON.stringify(deal.aiMessages || []),
  documents:        JSON.stringify(deal.documents || []),
  createdAt:        deal.createdAt || new Date().toISOString(),
  updatedAt:        new Date().toISOString(),
});

const fromAT = rec => ({
  id:               rec.id,
  atId:             rec.id,
  name:             rec.fields.name || "",
  stage:            rec.fields.stage || "sourcing",
  maType:           rec.fields.maType || "Unclear",
  buSponsor:        rec.fields.buSponsor || "TBD",
  platformPillar:   rec.fields.platformPillar || "TBD",
  source:           rec.fields.source || "",
  banker:           rec.fields.banker || "",
  priceSignal:      rec.fields.priceSignal || "",
  waitingOn:        rec.fields.waitingOn || "None",
  driveFolderUrl:   rec.fields.driveFolderUrl || "",
  deckSummary:      rec.fields.deckSummary || "",
  triageNotes:      rec.fields.triageNotes || "",
  productPingNotes: rec.fields.productPingNotes || "",
  triageMemoNotes:  rec.fields.triageMemoNotes || "",
  icNotes:          rec.fields.icNotes || "",
  passReason:       rec.fields.passReason || "",
  stageHistory:     tryParse(rec.fields.stageHistory, []),
  aiMessages:       tryParse(rec.fields.aiMessages, []),
  documents:        tryParse(rec.fields.documents, []),
  createdAt:        rec.fields.createdAt || rec.createdTime,
  updatedAt:        rec.fields.updatedAt || rec.createdTime,
});

function tryParse(str, fallback) {
  try { return str ? JSON.parse(str) : fallback; } catch { return fallback; }
}

const atApi = {
  async list() {
    let records = [], offset = null;
    do {
      const url = AT_URL + (offset ? `?offset=${offset}` : "");
      const res = await fetch(url, { headers: AT_HEADERS });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      records = records.concat(data.records || []);
      offset = data.offset;
    } while (offset);
    return records.map(fromAT);
  },
  async create(deal) {
    const res = await fetch(AT_URL, {
      method: "POST", headers: AT_HEADERS,
      body: JSON.stringify({ fields: toAT(deal) }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return fromAT(data);
  },
  async update(deal) {
    const res = await fetch(`${AT_URL}/${deal.atId}`, {
      method: "PATCH", headers: AT_HEADERS,
      body: JSON.stringify({ fields: toAT(deal) }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return fromAT(data);
  },
  async delete(atId) {
    await fetch(`${AT_URL}/${atId}`, { method: "DELETE", headers: AT_HEADERS });
  },
};

    );

  return (

// ── AI chat ────────────────────────────────────────────────────────────────────
function AIChat({deal, onUpdate}) {
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const msgs=deal.aiMessages||[];
  const QUICK=["Does this fit our M&A framework?","Draft a Product ping","Draft banker outreach","Key risks?","Write triage memo","Diligence questions"];
  const send=async(text)=>{
    if(!text.trim()||loading)return;
    const next=[...msgs,{role:"user",content:text}];
    onUpdate(next);setInput("");setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:`You are an M&A analyst for Infillion (composable ad-tech). Framework: Type 1=composable component across BUs; Type 2=deep expertise in a customer type. Prefer limited cash upfront. MOS=dominant post-acquisition culture.\nDeal: ${deal.name||"Unknown"} | Stage: ${deal.stage} | Type: ${deal.maType} | BU: ${deal.buSponsor} | Price: ${deal.priceSignal||"none"}\nSummary: ${deal.deckSummary||"none"} | Triage: ${deal.triageNotes||"none"} | Product: ${deal.productPingNotes||"none"}\nBe direct, concise, commercially savvy.`,
        messages:next,
      })});
      const data=await res.json();
      onUpdate([...next,{role:"assistant",content:data.content?.[0]?.text||"No response."}]);
    }catch{onUpdate([...next,{role:"assistant",content:"Error reaching API."}]);}
    setLoading(false);
  };
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
        {QUICK.map(q=><button key={q} onClick={()=>send(q)} style={{fontSize:11,padding:"3px 9px",borderRadius:20,border:"1px solid #d8d6ce",cursor:"pointer",background:"white",color:"#6b6963"}}>{q}</button>)}
      </div>
      <div style={{maxHeight:240,overflowY:"auto",display:"flex",flexDirection:"column",gap:7,marginBottom:8,background:"#f7f6f3",borderRadius:8,padding:10}}>
        {msgs.length===0&&<div style={{fontSize:12,color:"#b8b6ae",textAlign:"center",padding:"20px 0"}}>Ask anything about this deal</div>}
        {msgs.map((m,i)=>(
          <div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"85%",background:m.role==="user"?"#EEEDFE":"white",color:m.role==="user"?"#3C3489":"#1a1a18",border:m.role==="assistant"?"1px solid #e0ded6":"none",borderRadius:m.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"7px 11px",fontSize:12,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.content}</div>
        ))}
        {loading&&<div style={{alignSelf:"flex-start",fontSize:12,color:"#9e9c96",padding:"7px 11px"}}>Thinking…</div>}
      </div>
      <div style={{display:"flex",gap:6}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(input)} placeholder="Ask anything about this deal…" style={inp} disabled={loading}/>
        <button onClick={()=>send(input)} disabled={loading||!input.trim()} style={{padding:"7px 14px",borderRadius:6,fontSize:13,fontWeight:600,background:"#534AB7",color:"white",border:"none",cursor:"pointer",opacity:loading||!input.trim()?0.5:1}}>Send</button>
      </div>
    </div>
  );
}

// ── Gmail picker ───────────────────────────────────────────────────────────────
function GmailPicker({onSelect, onBack}) {
  const [query,setQuery]=useState('has:attachment CIM OR CIP OR "business overview" OR "investment opportunity"');
  const [emails,setEmails]=useState([]);
  const [loading,setLoading]=useState(false);
  const [reading,setReading]=useState(null);
  const search=async()=>{
    setLoading(true);setEmails([]);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,mcp_servers:[{type:"url",url:"https://gmail.mcp.claude.com/mcp",name:"Gmail"}],messages:[{role:"user",content:`Search Gmail for: "${query}", maxResults:15. Return ONLY a JSON array, no markdown: [{"messageId":"...","subject":"...","from":"...","date":"...","snippet":"..."}]`}]})});
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"[]";
      const match=text.match(/\[[\s\S]*\]/);
      setEmails(match?JSON.parse(match[0]):[]);
    }catch{setEmails([]);}
    setLoading(false);
  };
  const pick=async(email)=>{
    setReading(email.messageId);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,mcp_servers:[{type:"url",url:"https://gmail.mcp.claude.com/mcp",name:"Gmail"}],messages:[{role:"user",content:`Read Gmail message ${email.messageId}. Return ONLY this JSON (no markdown): {"name":"company name","source":"sender or banker","banker":"banker firm or empty","maType":"Unclear|Component acquisition|Customer type acquisition|Both","priceSignal":"valuation or empty","deckSummary":"2-3 sentence summary"}`}]})});
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"{}";
      const match=text.replace(/```json|```/g,"").match(/\{[\s\S]*\}/);
      onSelect({...(match?JSON.parse(match[0]):{}),gmailFrom:email.from});
    }catch{onSelect({name:email.subject,source:email.from});}
    setReading(null);
  };
  return (
    <div style={{background:"white",minHeight:"100%",padding:18,maxWidth:700,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#534AB7",padding:0,fontWeight:600}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="#534AB7" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Pipeline
        </button>
        <div style={{fontSize:15,fontWeight:600,color:"#1a1a18"}}>Import from Gmail</div>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:14}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} style={{...inp,flex:1}}/>
        <button onClick={search} disabled={loading} style={{padding:"7px 16px",borderRadius:6,fontSize:12,fontWeight:600,background:"#534AB7",color:"white",border:"none",cursor:"pointer",opacity:loading?0.6:1}}>{loading?"Searching…":"Search"}</button>
      </div>
      {emails.length===0&&!loading&&<div style={{textAlign:"center",padding:"40px 0",color:"#9e9c96",fontSize:13}}>Search your inbox for inbound M&A emails</div>}
      {emails.map(e=>(
        <div key={e.messageId} onClick={()=>!reading&&pick(e)} style={{padding:"10px 12px",borderRadius:8,marginBottom:6,cursor:"pointer",background:reading===e.messageId?"#EEEDFE":"#f7f6f3",border:"1px solid #e0ded6"}}>
          <div style={{fontWeight:600,fontSize:13,color:"#1a1a18",marginBottom:2}}>{e.subject}</div>
          <div style={{fontSize:11,color:"#6b6963"}}>{e.from} · {e.date}</div>
          {e.snippet&&<div style={{fontSize:11,color:"#9e9c96",marginTop:3}}>{e.snippet.slice(0,100)}…</div>}
          {reading===e.messageId&&<div style={{fontSize:11,color:"#534AB7",marginTop:4,fontWeight:600}}>Reading & extracting deal details…</div>}
        </div>
      ))}
    </div>
  );
}

// ── Analytics ──────────────────────────────────────────────────────────────────
function Analytics({deals, onBack}) {
  const passed=deals.filter(d=>d.stage==="passed"),closed=deals.filter(d=>d.stage==="closed");
  const active=deals.filter(d=>!["passed","closed","hold"].includes(d.stage));
  const waiting=deals.filter(d=>d.waitingOn&&d.waitingOn!=="None");
  const passFrom=id=>passed.filter(d=>(d.stageHistory||[]).some(h=>h.to==="passed"&&h.from===id)).length;
  return (
    <div style={{background:"white",minHeight:"100%",padding:18,maxWidth:700,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#534AB7",padding:0,fontWeight:600}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="#534AB7" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Pipeline
        </button>
        <div style={{fontSize:15,fontWeight:600,color:"#1a1a18"}}>Pipeline analytics</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
        {[["Total",deals.length,"#534AB7"],["Active",active.length,"#0F6E56"],["Waiting",waiting.length,"#854F0B"],["Passed",passed.length,"#5F5E5A"],["Closed",closed.length,"#3B6D11"],["Win rate",deals.length?Math.round(closed.length/deals.length*100)+"%":"—","#3B6D11"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#f7f6f3",border:"1px solid #e0ded6",borderRadius:8,padding:"12px 14px"}}>
            <div style={{fontSize:24,fontWeight:600,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#6b6963",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      {passed.length>0&&(
        <div style={{marginBottom:20}}>
          <Label>Where deals are being passed</Label>
          {STAGES.slice(0,7).map(s=>{const n=passFrom(s.id);if(!n)return null;return(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{width:100,fontSize:12,color:"#6b6963",flexShrink:0}}>{s.label}</div>
              <div style={{flex:1,background:"#e8e6de",borderRadius:4,height:8}}><div style={{width:`${(n/passed.length)*100}%`,background:s.color,height:"100%",borderRadius:4}}/></div>
              <div style={{fontSize:12,width:16,color:"#6b6963"}}>{n}</div>
            </div>
          );})}
        </div>
      )}
      {[["By M&A type",MA_TYPES,"maType"],["By BU sponsor",BU_SPONSORS,"buSponsor"]].map(([title,opts,key])=>(
        <div key={title} style={{marginBottom:20}}>
          <Label>{title}</Label>
          {opts.filter(o=>deals.some(d=>d[key]===o)).map(o=>(
            <div key={o} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #e8e6de",fontSize:13}}>
              <span style={{color:"#6b6963"}}>{o}</span><span style={{fontWeight:600}}>{deals.filter(d=>d[key]===o).length}</span>
            </div>
          ))}
        </div>
      ))}
      {waiting.length>0&&(
        <div style={{marginBottom:20}}>
          <Label>Waiting on someone</Label>
          {waiting.map(d=>(
            <div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #e8e6de",fontSize:13}}>
              <span style={{color:"#6b6963"}}>{d.name}</span><span style={{color:"#854F0B",fontWeight:600}}>{d.waitingOn}</span>
            </div>
          ))}
        </div>
      )}
      {passed.length>0&&(
        <div>
          <Label>Pass log</Label>
          {passed.map(d=>(
            <div key={d.id} style={{marginBottom:8,padding:10,background:"#f7f6f3",border:"1px solid #e0ded6",borderRadius:8}}>
              <div style={{fontSize:13,fontWeight:600,color:"#1a1a18"}}>{d.name}</div>
              <div style={{fontSize:12,color:"#6b6963",marginTop:3}}>{d.passReason||"No reason recorded"}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Main app ───────────────────────────────────────────────────────────────────
function App() {
  const [deals,setDeals]   = useState([]);
  const [loaded,setLoaded] = useState(false);
  const [error,setError]   = useState(null);
  const [view,setView]     = useState({page:"list"});
  const [filter,setFilter] = useState("active");
  const [search,setSearch] = useState("");
  const [saving,setSaving] = useState(false);

  useEffect(()=>{
    atApi.list().then(ds=>{ setDeals(ds); setLoaded(true); })
      .catch(e=>{ setError(e.message); setLoaded(true); });
  },[]);

  const createDeal = async (partial={}) => {
    const d = blank(partial);
    setSaving(true);
    try {
      const created = await atApi.create(d);
      setDeals(prev=>[created,...prev]);
      setView({page:"deal", dealId:created.atId});
    } catch(e) { alert("Error creating deal: "+e.message); }
    setSaving(false);
  };

  const saveDeal = async (updated) => {
    setSaving(true);
    try {
      const saved = await atApi.update(updated);
      setDeals(prev=>prev.map(x=>x.atId===saved.atId?saved:x));
      setView({page:"list"});
    } catch(e) { alert("Error saving deal: "+e.message); }
    setSaving(false);
  };

  const deleteDeal = async (atId) => {
    setSaving(true);
    try {
      await atApi.delete(atId);
      setDeals(prev=>prev.filter(x=>x.atId!==atId));
      setView({page:"list"});
    } catch(e) { alert("Error deleting deal: "+e.message); }
    setSaving(false);
  };

  const toggleF = id => setFilter(f=>f===id?"active":id);

  const filtered = deals.filter(d=>{
    const fOk = filter==="all"?true:filter==="active"?!["passed","closed","hold"].includes(d.stage):filter==="waiting"?d.waitingOn&&d.waitingOn!=="None":filter==="hold"?d.stage==="hold":d.stage===filter;
    const sOk = !search||d.name.toLowerCase().includes(search.toLowerCase())||(d.deckSummary||"").toLowerCase().includes(search.toLowerCase());
    return fOk&&sOk;
  });

  if (!loaded) return <Spinner/>;

  if (error) return (
    <div style={{padding:24,maxWidth:500,margin:"0 auto"}}>
      <div style={{background:"#FAECE7",border:"1px solid #993C1D44",borderRadius:8,padding:16,fontSize:13,color:"#712B13",lineHeight:1.6}}>
        <strong>Could not connect to Airtable</strong><br/>{error}
      </div>
    </div>
  );

  if (view.page==="deal") {
    const deal=deals.find(x=>x.atId===view.dealId);
    if(!deal)return <div style={{padding:20,color:"#9e9c96"}}>Deal not found.</div>;
    return <DealDetail deal={deal} onSave={saveDeal} onBack={()=>setView({page:"list"})} onDelete={deleteDeal} saving={saving}/>;
  }
  if (view.page==="gmail")     return <GmailPicker onSelect={p=>{setView({page:"list"});createDeal(p);}} onBack={()=>setView({page:"list"})}/>;
  if (view.page==="analytics") return <Analytics deals={deals} onBack={()=>setView({page:"list"})}/>;
  if (view.page==="process")   return <ProcessPage onBack={()=>setView({page:"list"})}/>;

  return (
    <div style={{padding:16,fontFamily:"inherit",maxWidth:700,margin:"0 auto",background:"white",minHeight:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:"#1a1a18"}}>M&A pipeline</div>
          <div style={{fontSize:12,color:"#9e9c96"}}>Infillion Corp Dev</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setView({page:"process"})} style={{padding:"6px 11px",borderRadius:6,fontSize:12,background:"#f7f6f3",color:"#6b6963",border:"1px solid #d8d6ce",cursor:"pointer"}}>📋 Process</button>
          <button onClick={()=>setView({page:"analytics"})} style={{padding:"6px 11px",borderRadius:6,fontSize:12,background:"#f7f6f3",color:"#6b6963",border:"1px solid #d8d6ce",cursor:"pointer"}}>Analytics</button>
          <button onClick={()=>setView({page:"gmail"})} style={{padding:"6px 11px",borderRadius:6,fontSize:12,fontWeight:600,background:"#EEEDFE",color:"#3C3489",border:"1px solid #534AB744",cursor:"pointer"}}>+ Gmail</button>
          <button onClick={()=>createDeal()} disabled={saving} style={{padding:"6px 11px",borderRadius:6,fontSize:12,fontWeight:600,background:"#534AB7",color:"white",border:"none",cursor:"pointer",opacity:saving?0.6:1}}>+ New deal</button>
        </div>
      </div>

      <PipelineBar deals={deals} active={filter} onClick={toggleF}/>

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        {[{id:"active",label:"Active"},{id:"waiting",label:"Waiting on…"},{id:"hold",label:"Hold"},{id:"passed",label:"Passed"},{id:"closed",label:"Closed"},{id:"all",label:"All"}].map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:"4px 12px",borderRadius:20,fontSize:12,cursor:"pointer",background:filter===f.id?"#534AB7":"#f7f6f3",color:filter===f.id?"white":"#6b6963",border:filter===f.id?"none":"1px solid #d8d6ce",fontWeight:filter===f.id?600:400}}>{f.label}</button>
        ))}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{...inp,flex:1,minWidth:120,padding:"4px 10px",fontSize:12}}/>
      </div>

      {filtered.length===0
        ?<div style={{textAlign:"center",padding:"40px 0",color:"#9e9c96",fontSize:14}}>{deals.length===0?"No deals yet — add your first deal to get started.":"No deals match this filter."}</div>
        :filtered.map(d=>{
          const waiting=d.waitingOn&&d.waitingOn!=="None";
          return(
            <div key={d.atId} onClick={()=>setView({page:"deal",dealId:d.atId})} style={{border:waiting?"1px solid #EF9F27":"1px solid #e0ded6",borderLeft:waiting?"3px solid #EF9F27":"1px solid #e0ded6",borderRadius:10,padding:"11px 13px",cursor:"pointer",marginBottom:8,background:"white"}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
                <div style={{fontWeight:600,fontSize:14,color:d.name?"#1a1a18":"#9e9c96",fontStyle:d.name?"normal":"italic"}}>{d.name||"Unnamed deal"}</div>
                <Tag id={d.stage}/>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:5}}>
                {d.maType!=="Unclear"&&<span style={{fontSize:11,color:"#6b6963"}}>{d.maType}</span>}
                {d.platformPillar&&d.platformPillar!=="TBD"&&<span style={{fontSize:11,color:"#534AB7",fontWeight:600}}>{d.platformPillar}</span>}
                {d.buSponsor!=="TBD"&&<span style={{fontSize:11,color:"#6b6963"}}>{d.buSponsor}</span>}
                {d.source&&<span style={{fontSize:11,color:"#6b6963"}}>{d.source}</span>}
                {d.documents?.length>0&&<span style={{fontSize:11,color:"#534AB7",fontWeight:600}}>{d.documents.length} doc{d.documents.length>1?"s":""}</span>}
                {waiting&&<span style={{fontSize:11,color:"#854F0B",fontWeight:600}}>Waiting: {d.waitingOn}</span>}
              </div>
              {d.deckSummary&&<div style={{fontSize:12,color:"#6b6963",marginTop:5,lineHeight:1.5}}>{d.deckSummary.slice(0,120)}{d.deckSummary.length>120?"…":""}</div>}
            </div>
          );
        })
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
